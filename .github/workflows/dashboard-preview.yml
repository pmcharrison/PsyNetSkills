name: Deploy dashboard PR preview

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: dashboard-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Build and deploy PR preview
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          lfs: true
      - run: git lfs checkout
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.162.1"
      - id: preview
        name: Define preview URL
        run: |
          set -euo pipefail

          preview_path="pr-preview/pr-${{ github.event.pull_request.number }}"
          preview_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${preview_path}/"
          artifact_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/artifacts/blobs/sha256"

          echo "path=${preview_path}" >> "${GITHUB_OUTPUT}"
          echo "url=${preview_url}" >> "${GITHUB_OUTPUT}"
          echo "artifact_url=${artifact_url}" >> "${GITHUB_OUTPUT}"
          echo "Dashboard preview: ${preview_url}" >> "${GITHUB_STEP_SUMMARY}"
      - run: uv sync --group dev
      - run: uv run psynetsk-validate
      - run: uv run psynetsk-export-dashboard-data
        env:
          PSYNETSK_ARTIFACT_URL_PREFIX: ${{ steps.preview.outputs.artifact_url }}
      - run: >
          hugo
          --source dashboard
          --destination ../public
          --cleanDestinationDir
          --baseURL "${{ steps.preview.outputs.url }}"
      - name: Deploy preview to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PAGES_BRANCH: gh-pages
          PREVIEW_PATH: ${{ steps.preview.outputs.path }}
        run: |
          set -euo pipefail

          pages_dir="$(mktemp -d)"
          origin_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote set-url origin "${origin_url}"

          if git ls-remote --exit-code --heads origin "${PAGES_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${PAGES_BRANCH}"
            git worktree add --detach "${pages_dir}" "origin/${PAGES_BRANCH}"
          else
            git -c init.defaultBranch="${PAGES_BRANCH}" init "${pages_dir}"
            git -C "${pages_dir}" remote add origin "${origin_url}"
          fi

          git -C "${pages_dir}" config user.name "github-actions[bot]"
          git -C "${pages_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python .github/scripts/prepare-preview-pages.py "${pages_dir}" "public" "${PREVIEW_PATH}"
          touch "${pages_dir}/.nojekyll"

          git -C "${pages_dir}" add -A
          if git -C "${pages_dir}" diff --cached --quiet; then
            echo "No dashboard preview changes to deploy."
          else
            git -C "${pages_dir}" commit -m "Deploy dashboard preview for PR #${{ github.event.pull_request.number }}"
            .github/scripts/push-pages-branch.sh "${pages_dir}" "${PAGES_BRANCH}"
          fi
      - name: Comment preview URL
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- psynetsk-dashboard-preview -->';
            const previewUrl = '${{ steps.preview.outputs.url }}';
            const body = [
              marker,
              'Legacy dashboard PR preview:',
              previewUrl,
              '',
              'Static PR previews are being replaced by live tunnel previews.',
              'For active Cursor Cloud review, ask the agent to run `preview-dashboard-live`.',
              '',
              `Built from commit \`${context.payload.pull_request.head.sha.slice(0, 7)}\`.`
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              core.info('No existing dashboard preview comment found; not creating a new legacy static preview comment.');
            }

  cleanup-preview:
    name: Finalize closed PR preview
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --group dev
      - id: preview
        name: Define preview URLs
        run: |
          set -euo pipefail

          preview_path="pr-preview/pr-${{ github.event.pull_request.number }}"
          preview_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${preview_path}/"
          production_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          echo "path=${preview_path}" >> "${GITHUB_OUTPUT}"
          echo "url=${preview_url}" >> "${GITHUB_OUTPUT}"
          echo "production_url=${production_url}" >> "${GITHUB_OUTPUT}"
      - name: Finalize preview on gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          MERGED: ${{ github.event.pull_request.merged }}
          PAGES_BRANCH: gh-pages
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PRODUCTION_URL: ${{ steps.preview.outputs.production_url }}
        run: |
          set -euo pipefail

          origin_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote set-url origin "${origin_url}"

          if ! git ls-remote --exit-code --heads origin "${PAGES_BRANCH}" >/dev/null 2>&1; then
            echo "No ${PAGES_BRANCH} branch exists; nothing to clean up."
            exit 0
          fi

          pages_dir="$(mktemp -d)"

          git fetch origin "${PAGES_BRANCH}"
          git worktree add --detach "${pages_dir}" "origin/${PAGES_BRANCH}"
          git -C "${pages_dir}" config user.name "github-actions[bot]"
          git -C "${pages_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          states_json="${RUNNER_TEMP}/dashboard-preview-pr-states.json"
          gh pr list --state all --limit 1000 --json number,state > "${states_json}"
          python - "${states_json}" "${PR_NUMBER}" "${MERGED}" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          pr_number = int(sys.argv[2])
          state = "MERGED" if sys.argv[3] == "true" else "CLOSED"
          with open(path, encoding="utf-8") as f:
              states = json.load(f)
          if not any(int(item["number"]) == pr_number for item in states):
              states.append({"number": pr_number, "state": state})
          with open(path, "w", encoding="utf-8") as f:
              json.dump(states, f)
          PY
          uv run python -m psynetsk_tools.pr_preview_cleanup "${pages_dir}/pr-preview" "${PRODUCTION_URL}" "${states_json}" --artifact-root "${pages_dir}/pr-artifacts"

          git -C "${pages_dir}" add -A
          if git -C "${pages_dir}" diff --cached --quiet; then
            echo "Dashboard preview cleanup is already up to date."
          else
            git -C "${pages_dir}" commit -m "Clean dashboard previews after PR #${{ github.event.pull_request.number }}"
            .github/scripts/push-pages-branch.sh "${pages_dir}" "${PAGES_BRANCH}"
          fi
      - name: Comment preview cleanup
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- psynetsk-dashboard-preview -->';
            const merged = ${{ github.event.pull_request.merged }};
            const body = [
              marker,
              merged
                ? 'Dashboard preview now redirects to the production dashboard because this PR was merged.'
                : 'Dashboard preview removed because this PR is closed.',
              '',
              `Previous preview URL: ${{ steps.preview.outputs.url }}`,
              ...(merged ? ['', `Production dashboard: ${{ steps.preview.outputs.production_url }}`] : [])
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
