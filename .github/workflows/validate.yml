name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v5
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
      - run: uv sync --group dev
      - run: uv run psynetsk-validate
      - run: uv run pytest
      - run: uv run psynetsk-export-dashboard-data
      - run: hugo --source dashboard --destination ../public --cleanDestinationDir
