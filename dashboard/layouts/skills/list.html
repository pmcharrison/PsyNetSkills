{{ define "main" }}
  {{ .Content }}

  <div class="cards">
    {{ range sort hugo.Data.psynetsk.skills "title" }}
      <article>
        <h2><a href="{{ .url | relURL }}">{{ .title }}</a></h2>
        <p>{{ .description }}</p>
        <p><strong>Source:</strong> <code>{{ .path }}</code></p>
      </article>
    {{ end }}
  </div>
{{ end }}
