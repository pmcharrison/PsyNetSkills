{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <div class="item-list">
    {{ range site.Data.psynetsk.skills }}
      <article>
        <h2><a href="{{ .url | relURL }}">{{ .name }}</a></h2>
        <p>{{ .description }}</p>
        <p><code>{{ .path }}</code></p>
      </article>
    {{ end }}
  </div>
{{ end }}
