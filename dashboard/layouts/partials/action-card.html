{{ $statusClass := replace .status "_" "-" }}
<div
  class="action-card-row"
  data-action-card-row
  data-action-id="{{ .id }}"
  data-action-repository="{{ .repository }}"
  data-action-confidence="{{ .confidence }}"
  data-action-impact="{{ .impact }}"
  data-action-status="{{ .status }}"
  data-action-challenge="{{ .challenge_title }}"
  data-action-attempt="{{ .attempt_name }}"
>
  <article class="action-card" id="{{ .anchor_id }}">
    <div class="action-card-meta">
      <span class="learning-chip learning-chip-repository">
        <span class="learning-chip-label">Repository</span> {{ .repository }}
      </span>
      <span class="learning-chip learning-chip-confidence learning-chip-confidence-{{ .confidence }}">
        <span class="learning-chip-label">Confidence</span> {{ .confidence }}
      </span>
      <span class="learning-chip learning-chip-impact learning-chip-impact-{{ .impact }}">
        <span class="learning-chip-label">Impact</span> {{ .impact }}
      </span>
      <span class="learning-chip learning-chip-status learning-chip-status-{{ $statusClass }}">
        <span class="learning-chip-label">Status</span> {{ replace .status "_" " " }}
      </span>
    </div>
    <p class="action-card-proposal">{{ .proposal }}</p>
    <p class="action-card-source">
      <a href="{{ .source_url | relURL }}">{{ .challenge_title }} / {{ .attempt_name }}</a>
      <span>· {{ .source_section }}</span>
    </p>
    <p class="action-card-path"><code>{{ .source_path }}</code></p>
  </article>
</div>
