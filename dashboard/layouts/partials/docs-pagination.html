{{ if eq .Section "docs" }}
  {{ if or .Params.previous .Params.next }}
    <nav class="docs-pagination" aria-label="Docs pagination">
      {{ with .Params.previous }}
        <a class="previous" href="{{ .url | relURL }}">Previous: {{ .title }}</a>
      {{ else }}
        <span></span>
      {{ end }}
      {{ with .Params.next }}
        <a class="next" href="{{ .url | relURL }}">Next: {{ .title }}</a>
      {{ else }}
        <span></span>
      {{ end }}
    </nav>
  {{ end }}
{{ end }}
