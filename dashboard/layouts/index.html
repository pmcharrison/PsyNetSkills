{{ define "main" }}
  {{ with index (sort site.Data.psynetsk.docs "weight") 0 }}
    {{ $url := cond (eq .slug "index") "docs/" (printf "docs/%s/" .slug) }}
    <p>Redirecting to <a href="{{ $url | relURL }}">{{ .title }}</a>.</p>
    <script>window.location.replace({{ $url | jsonify | safeJS }});</script>
  {{ end }}
{{ end }}
