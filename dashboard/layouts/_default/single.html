{{ define "main" }}
  {{ if eq .Section "docs" }}
    <div class="content-layout">
      {{ partial "section-sidebar.html" (dict "page" . "section" "docs" "title" "Docs") }}
      <article class="prose">
        <h1>{{ .Title }}</h1>
        {{ .Content }}
        {{ partial "docs-pagination.html" . }}
      </article>
    </div>
  {{ else }}
    <article class="prose">
      <h1>{{ .Title }}</h1>
      {{ .Content }}
    </article>
  {{ end }}
{{ end }}
