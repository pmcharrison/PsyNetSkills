<!doctype html>
<html lang="{{ site.Language.Lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ site.Title }}</title>
    <link rel="stylesheet" href="{{ "css/chroma.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a>
      <nav aria-label="Main navigation">
        <a href="{{ "docs/" | relURL }}">Docs</a>
        {{ with index (sort site.Data.psynetsk.skills "title") 0 }}
          <a href="{{ .url | relURL }}">Skills</a>
        {{ end }}
        <a href="{{ "challenges/" | relURL }}">Challenges</a>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ if and .IsPage (in (slice "docs" "skills" "challenges") .Section) }}
      {{ partial "giscus.html" . }}
    {{ end }}
    <footer>
    </footer>
  </body>
</html>
