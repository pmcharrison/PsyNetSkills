<!doctype html>
<html lang="{{ site.Language.Lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ site.Title }}</title>
    <link rel="stylesheet" href="{{ "css/chroma.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
  </head>
  <body>
    <header class="site-header">
      <nav class="primary-nav" aria-label="Main navigation">
        <a
          {{ if .IsHome }}aria-current="page" class="current"{{ end }}
          href="{{ site.Home.RelPermalink }}"
        >PsyNetSkills</a>
        <a
          {{ if eq .Section "skills" }}aria-current="page" class="current"{{ end }}
          href="{{ "skills/" | relURL }}"
        >Skills</a>
        <a
          {{ if eq .Section "challenges" }}aria-current="page" class="current"{{ end }}
          href="{{ "challenges/" | relURL }}"
        >Challenges</a>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ if and .IsPage (in (slice "skills" "challenges") .Section) }}
      {{ partial "giscus.html" . }}
    {{ end }}
    <footer>
    </footer>
  </body>
</html>
