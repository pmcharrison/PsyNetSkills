baseURL = "/"
locale = "en-gb"
title = "PsyNetSkills"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "robotsTXT"]

[params]
  github_repo_url = "https://github.com/pmcharrison/PsyNetSkills"
  github_edit_base_url = "https://github.com/pmcharrison/PsyNetSkills/edit/main/"
  github_owner = "pmcharrison"
  github_repo_name = "PsyNetSkills"
  workflow_status_poll_seconds = 90
  workflow_status_hidden_poll_seconds = 300

  [params.giscus]
    enabled = true
    repo = "pmcharrison/PsyNetSkills"
    repo_id = "R_kgDOSw3rlA"
    category = "Announcements"
    category_id = "DIC_kwDOSw3rlM4C-xgp"
    mapping = "pathname"
    # Require exact pathname matches so attempt pages do not reuse parent challenge discussions.
    strict = "1"
    reactions_enabled = "1"
    emit_metadata = "0"
    input_position = "bottom"
    theme = "light"
    lang = "en"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "github"

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "data"
    target = "data"
