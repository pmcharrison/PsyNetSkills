baseURL = "/"
locale = "en-gb"
title = "PsyNetSkills"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "robotsTXT"]

[params]
  [params.giscus]
    enabled = false
    repo = ""
    repo_id = ""
    category = ""
    category_id = ""
    mapping = "pathname"
    strict = "0"
    reactions_enabled = "1"
    emit_metadata = "0"
    input_position = "bottom"
    theme = "preferred_color_scheme"
    lang = "en"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "github"

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "data"
    target = "data"
