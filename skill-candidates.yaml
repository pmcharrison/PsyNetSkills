      differences, and unclear evidence boundaries; failures here can lose data
      or misrepresent deployment state.
    trigger: >-
      Use when auditing deployment readiness, reconstructing deployment logs,
      collecting local or remote exports, capturing monitor snapshots, or
      deciding whether a deployed experiment can be stopped or torn down.
    proposed_disposition: extension
    triage: candidate
    overlap_notes: >-
      Extends `psynet-deployment-ops`; export/analysis and dashboard evidence
