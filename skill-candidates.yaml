  - id: replication-fidelity-planning
    title: Replication fidelity planning and escalation
    status: unreviewed
    urgency: high
    necessity: >-
      Replication attempts can pass local tests while failing the scientific
      fidelity bar when source materials, questionnaires, stimulus quality, or
      participant-facing phrasing are reconstructed without an auditable plan or
      escalation point.
    trigger: >-
      Use before implementing close replication tasks or studies whose success
      depends on matching external materials, instruments, instructions,
      scoring, media, or styling.
    proposed_disposition: extension
    triage: candidate
    overlap_notes: >-
      Extends `psynet-experiment-implementation` and related backend guidance;
      existing planning instructions cover `PLAN.md`, but not enough
      replication-specific fidelity checks.
    evidence_sources:
      - single-chord-emotion-replication/2026-06-10-12-44/action-003
      - single-chord-emotion-replication/2026-06-10-12-44/action-004
      - challenges/single-chord-emotion-replication/attempts/2026-06-10-12-44/EVALUATION.md
      - challenges/single-chord-emotion-replication/attempts/2026-06-10-12-44/LEARNINGS.md
      - rolling-inventory-melody-market/2026-06-10-20-01/action-002
      - challenges/audio-memory-sequence/attempts/2026-06-08-09-29/EVALUATION.md
    source_ids:
