      - single-chord-emotion-replication/2026-06-10-12-44/action-004
      - challenges/single-chord-emotion-replication/attempts/2026-06-10-12-44/EVALUATION.md
      - challenges/single-chord-emotion-replication/attempts/2026-06-10-12-44/LEARNINGS.md
      - rolling-inventory-melody-market/2026-06-10-20-01/action-002
      - challenges/audio-memory-sequence/attempts/2026-06-08-09-29/EVALUATION.md
    trace_status: traced
    summary: >-
      Candidate guidance should require local reference files or explicit source
      citations for reconstructed instruments when licensing allows, early
      decisions about practice/calibration/response modality, and a stop-and-ask
      rule when core assets cannot be recreated at the requested fidelity.

  - id: simulation-analysis-evidence-standard
    title: Simulation and analysis evidence standard
    status: unreviewed
    urgency: high
    necessity: >-
      Multiple attempts ran code successfully but produced weak simulation or
      analysis evidence: custom scripts replaced PsyNet-native simulation,
      condition coverage was not inspected, response distributions were not
      visualized, or replication analyses lacked notebook-like review outputs.
    trigger: >-
      Use when a challenge requires simulation, performance evidence, exported
      data analysis, adaptive/non-adaptive comparison, or replication-oriented
      analytical reconstruction.
    proposed_disposition: combination
    triage: candidate
    overlap_notes: >-
      Combines `psynet-experiment-implementation`,
      `process-dyadic-experiment-data`, and adaptive-experiment guidance; no
      single owner skill currently covers the full simulation-to-analysis
      evidence bar.
