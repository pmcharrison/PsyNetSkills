  - id: simulated-profile-calibration-framing
    title: Simulated profile calibration and conservative framing
    status: unreviewed
    urgency: high
    necessity: >-
      High-scoring attempts show the value of realistic simulated profiles and
      conservative claims, while open actions show a recurring risk of treating
      clean mock profiles or AI-assistance probes as calibrated evidence about
      real humans, real providers, or real participant behavior.
    trigger: >-
      Use when designing simulated participants, mock LLM-style profiles,
      AI-assistance probes, telemetry review fixtures, or analysis reports that
      compare profile classes.
    proposed_disposition: extension
    triage: candidate
    overlap_notes: >-
      Extends `psynet-experiment-implementation` and
      `psynet-participant-quality-telemetry`; the owner skills already mention
      simulations and telemetry, but not a reusable calibration/framing standard.
    evidence_sources:
      - challenges/simulated-participant-study-replication-loop/attempts/2026-06-11-14-12/EVALUATION.md
