mining_scope: balanced
source_scan:
  generated_from: dashboard/data/psynetsk.json
  helper_command: uv run python .cursor/skills/mine-skill-candidates/scripts/collect_sources.py --scope balanced
  focus:
    - planning/fidelity
    - run-attempt/manual testing
    - deployment safety
    - participant evidence/video
    - simulated participant profiles
    - telemetry/AI-assistance review
    - simulations
    - export/analysis
    - experiment monitoring/management

candidates:
  - id: final-handoff-reproducibility-gate
    title: Final handoff reproducibility gate for challenge attempts
    status: approved
    urgency: high
    necessity: >-
      Repeated attempt failures were not caused by missing implementation effort
      but by unstable final handoff: the submitted branch, local PsyNet run,
      evidence, and repository validation were not rechecked together after late
      fixes.
    trigger: >-
      Use when a runnable PsyNet challenge attempt is ready for handoff,
      especially after manual evidence collection, local debugging, or late
      correction passes.
    proposed_disposition: extension
    triage: candidate
    overlap_notes: >-
      Reviewed as an `attempt-challenge` checklist extension, with pointers to
      `record-participant-video` and validation guidance as needed; a new
      choreography skill would be too much process for this focused gate.
    evidence_sources:
      - video-recording-static-trials/2026-06-14-13-52/action-003
      - challenges/video-recording-static-trials/attempts/2026-06-14-13-52/EVALUATION.md
      - challenges/video-recording-static-trials/attempts/2026-06-14-13-52/LEARNINGS.md
      - evidence-workflow-demo/example-playwright-evidence/action-001
      - similarity-discrimination-identification/2026-06-10-00-38/action-003
    source_ids:
      - video-recording-static-trials/2026-06-14-13-52/action-003
      - challenges/video-recording-static-trials/attempts/2026-06-14-13-52/EVALUATION.md
      - challenges/video-recording-static-trials/attempts/2026-06-14-13-52/LEARNINGS.md
      - evidence-workflow-demo/example-playwright-evidence/action-001
      - similarity-discrimination-identification/2026-06-10-00-38/action-003
    trace_status: sorted
    summary: >-
      Candidate guidance should require a last-pass command bundle on the final
      committed branch, with `psynet test local`, challenge-specific evidence
      checks, and `uv run psynetsk-validate` rerun immediately before handoff.
      It should also require that participant-flow scripts assert the behavior
      shown in evidence rather than merely launching pages.
    review_notes: >-
      Approved as a high-impact checklist addition, not a new skill. Evidence
      supports a recurring handoff-quality failure mode, and the trigger is
      narrow enough to add to `attempt-challenge` without duplicating validation
      details.

  - id: participant-evidence-semantic-review
    title: Semantic review of participant evidence videos
    status: approved
    urgency: high
    necessity: >-
      Several attempts produced videos or screenshots that existed but did not
      prove the required interaction semantics, visual fidelity, or full task
      progression; this is a high-risk review gap because weak evidence can hide
      broken experiment behavior.
    trigger: >-
      Use when collecting or reviewing participant evidence for tasks with
      timing, visual layout, synchronous interaction, multiple response
      dimensions, timeout paths, or other behavior that must be visible in the
      recording.
    proposed_disposition: extension
    triage: candidate
    overlap_notes: >-
      Extends `record-participant-video`; a standalone new video skill would
      duplicate the owner skill, but its review checklist should explicitly cover
      semantic task progression.
    evidence_sources:
