<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" role="img" aria-labelledby="title desc">
  <title id="title">Ultimatum game interface sketch</title>
  <desc id="desc">A proposer panel on the left and a tabletop scene on the right with partner and me avatars, bowls, coins, and a table.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbfdff"/>
    </linearGradient>
    <radialGradient id="coin" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fff3a6"/>
      <stop offset="45%" stop-color="#f5b91c"/>
      <stop offset="100%" stop-color="#c97900"/>
    </radialGradient>
    <radialGradient id="bowl" cx="45%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#e9eef6" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#aeb8c5" stop-opacity="0.8"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0057ff" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="780" height="540" fill="#ffffff"/>

  <g filter="url(#soft-shadow)">
    <rect x="36" y="70" width="330" height="308" rx="34" fill="url(#panel)" stroke="#0b5cff" stroke-width="2"/>
  </g>
  <text x="62" y="115" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#222">Giving coins</text>
  <text x="62" y="132" font-family="Arial, sans-serif" font-size="7.4" fill="#333">Use the slider below to decide how many coins you will give to your partner, then</text>
  <text x="62" y="143" font-family="Arial, sans-serif" font-size="7.4" fill="#333">press Make the offer when you are ready.</text>
  <rect x="60" y="184" width="280" height="41" rx="4" fill="#fff" stroke="#e1e5ec"/>
  <line x1="80" y1="197" x2="320" y2="197" stroke="#e5e8ee" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="197" x2="148" y2="197" stroke="#1683ff" stroke-width="4" stroke-linecap="round"/>
  <circle cx="148" cy="197" r="4" fill="#1683ff"/>
  <text x="67" y="216" font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="#555">Min: 0</text>
  <text x="187" y="216" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="#555">3 coins</text>
  <text x="313" y="216" text-anchor="end" font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="#555">Max: 10</text>
  <rect x="146" y="292" width="107" height="23" rx="3" fill="#1677f2"/>
  <text x="199.5" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#fff">Make the offer</text>

  <g transform="translate(518 32)">
    <ellipse cx="22" cy="11" rx="24" ry="8" fill="url(#bowl)" stroke="#98a2af"/>
    <path d="M-2 14 C3 38 42 38 46 14 Z" fill="url(#bowl)" stroke="#b8c0ca"/>
    <ellipse cx="22" cy="14" rx="24" ry="8" fill="#ffffff" fill-opacity="0.4" stroke="#b8c0ca"/>
  </g>
  <g transform="translate(584 32)" fill="#000">
    <circle cx="20" cy="18" r="17"/>
    <path d="M-2 68 C3 37 38 37 43 68 C28 79 12 79 -2 68 Z"/>
  </g>
  <text x="539" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#6a6a6a">0 coins</text>
  <text x="604" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#6a6a6a">Partner</text>

  <g transform="translate(562 145)">
    <circle cx="0" cy="0" r="7" fill="url(#coin)"/>
    <circle cx="22" cy="0" r="7" fill="url(#coin)"/>
    <circle cx="44" cy="0" r="7" fill="url(#coin)"/>
  </g>

  <path d="M464 186 H725 L755 347 H432 Z" fill="#918b77"/>

  <g transform="translate(509 378)">
    <circle cx="0" cy="0" r="8" fill="url(#coin)"/>
    <circle cx="20" cy="0" r="8" fill="url(#coin)"/>
    <circle cx="40" cy="0" r="8" fill="url(#coin)"/>
    <circle cx="60" cy="0" r="8" fill="url(#coin)"/>
    <circle cx="80" cy="0" r="8" fill="url(#coin)"/>
    <circle cx="100" cy="0" r="8" fill="url(#coin)"/>
    <circle cx="120" cy="0" r="8" fill="url(#coin)"/>
    <circle cx="140" cy="0" r="8" fill="url(#coin)"/>
  </g>

  <g transform="translate(499 423)">
    <ellipse cx="26" cy="13" rx="31" ry="11" fill="url(#bowl)" stroke="#98a2af"/>
    <path d="M-4 17 C1 47 51 47 56 17 Z" fill="url(#bowl)" stroke="#b8c0ca"/>
    <ellipse cx="26" cy="17" rx="31" ry="11" fill="#ffffff" fill-opacity="0.4" stroke="#b8c0ca"/>
  </g>
  <g transform="translate(601 420)" fill="#000">
    <circle cx="25" cy="23" r="22"/>
    <path d="M-4 88 C3 48 47 48 55 88 C36 103 15 103 -4 88 Z"/>
  </g>
  <text x="525" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6a6a6a">0 coins</text>
  <text x="625" y="512" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#6a6a6a">Me</text>
</svg>
